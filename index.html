<!DOCTYPE html>
<html>
<head>
  <title>GameHub 🚀</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 GameHub</h1>

<!-- LOGIN -->
<button onclick="loginGoogle()">Login with Google</button>
<p id="user"></p>

<!-- FEATURE -->
<div class="featured">
  <button onclick="playGame('flappy.html')">🔥 Play Now</button>
  <button onclick="randomGame()">🎲 Random Game</button>
</div>

<!-- GAMES -->
<h2>⚡ Games</h2>
<div class="game-list">
  <div class="game-card" onclick="playGame('flappy.html')">🐦 Tap Escape</div>
  <div class="game-card" onclick="playGame('reaction.html')">⚡ Reaction</div>
  <div class="game-card" onclick="playGame('click.html')">🖱 Click Speed</div>
</div>

<!-- LEADERBOARD -->
<h2>🏆 Global Leaderboard</h2>
<div id="leaderboard"></div>
<button onclick="loadLeaderboardGlobal()">Refresh</button>
<script src="script.js"></script>
</body>
</html>
