<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#70c5ce;">

<canvas id="gameCanvas"></canvas>

<button onclick="restartGame()" style="position:fixed; bottom:20px; left:20px;">
  🔁 Restart
</button>

<script type="module">
import { saveScoreGlobal } from "../script.js";

let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bird, pipes, score;

function init() {
  bird = { x: 100, y: 200, gravity: 0.5, lift: -10, velocity: 0 };
  pipes = [];
  score = 0;
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  ctx.beginPath();
  ctx.arc(bird.x, bird.y, 15, 0, Math.PI * 2);
  ctx.fill();

  if (Math.random() < 0.02) {
    pipes.push({ x: canvas.width, top: 150, bottom: 200 });
  }

  pipes.forEach(pipe => {
    pipe.x -= 3;

    if (
      bird.x < pipe.x + 50 &&
      bird.x > pipe.x &&
      (bird.y < pipe.top || bird.y > canvas.height - pipe.bottom)
    ) {
      saveScoreGlobal(score);
      init();
    }

    if (pipe.x === bird.x) score++;
  });

  requestAnimationFrame(update);
}

function restartGame() {
  saveScoreGlobal(score);
  init();
}

document.addEventListener("click", () => {
  bird.velocity = -10;
});

init();
update();
</script>

</body>
</html>
